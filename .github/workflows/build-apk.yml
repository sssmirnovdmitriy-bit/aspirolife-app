name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reassemble source archive if split into parts
        run: |
          if ls app-source.zip.*.part >/dev/null 2>&1; then
            cat app-source.zip.*.part > app-source.zip
          fi
      - name: Unzip project source
        run: unzip -o app-source.zip -d .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fix syncfusion_flutter_pdfviewer version
        run: flutter pub add syncfusion_flutter_pdfviewer:^31.1.21

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK split per ABI
        run: flutter build apk --release --split-per-abi

      - name: Build release App Bundle for Google Play
        run: flutter build appbundle --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: AspiroLife build ${{ github.run_number }}
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish App Bundle to Google Play (production)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.aspiroapp.aspirolife
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed
